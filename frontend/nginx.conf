server {
    listen 80;
    client_max_body_size 20M;

    # Используем встроенный DNS-резолвер Docker для динамического разрешения IP-адресов.
    # Это предотвращает ошибку 502 при перезапуске backend-контейнера.
    resolver 127.0.0.11 valid=10s;
    set $backend_host "backend:8000";

    # 1. Telegram Mini App (под префиксом /tma/)
    location /tma/ {
        alias /usr/share/nginx/html/tma/;
        try_files $uri $uri/ /tma/index.html;
    }

    # 2. REST API бэкенда
    location /api/ {
        proxy_pass http://$backend_host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Django Admin Panel (скрыта под /administrator/)
    location /administrator/ {
        proxy_pass http://$backend_host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Статика Django Admin — раздаётся напрямую Nginx из общего тома
    location /static/ {
        alias /usr/share/nginx/html/static/;
    }

    # 5. Веб-сокеты (Django Channels / Daphne)
    location /ws/ {
        proxy_pass http://$backend_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6. Медиа-файлы (загруженные логотипы и т.д.)
    location /media/ {
        alias /app/media/;
    }

    # 7. Панель управления Admin Panel (SPA в корне сайта)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
