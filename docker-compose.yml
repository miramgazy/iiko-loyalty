version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: loyalty_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env

  redis:
    image: redis:7-alpine
    container_name: loyalty_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyalty_backend
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - db
      - redis
    env_file: .env

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyalty_celery_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      - db
      - redis
    env_file: .env

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyalty_celery_beat
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    env_file: .env

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_WEBHOOK_DOMAIN=${VITE_WEBHOOK_DOMAIN}
    container_name: loyalty_nginx
    ports:
      - "6054:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/usr/share/nginx/html/static:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:

