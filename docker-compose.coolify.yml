version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: loyalty_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: loyalty_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyalty_backend
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - db
      - redis
    env_file: .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyalty_celery_worker
    command: celery -A config worker -l info --concurrency=1
    volumes:
      - media_data:/app/media
    depends_on:
      - db
      - redis
    env_file: .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 96M

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyalty_celery_beat
    command: celery -A config beat -l info
    depends_on:
      - db
      - redis
    env_file: .env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 48M

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_WEBHOOK_DOMAIN=${VITE_WEBHOOK_DOMAIN}
    container_name: loyalty_nginx
    ports:
      - "6054:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/usr/share/nginx/html/static:ro
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 48M

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
